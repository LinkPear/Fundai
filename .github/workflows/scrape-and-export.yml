name: Scrape and export Gundam card data

on:
  schedule:
    # Monday and Thursday, 13:00 UTC
    - cron: '0 13 * * 1,4'
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit cards.json back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          grep -v '^asyncio' requirements.txt > requirements.filtered.txt
          pip install -r requirements.filtered.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run diff-aware sync
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python sync.py

      - name: Commit and push cards.json if it changed
        run: |
          if ! git diff --quiet cards.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add cards.json
            git commit -m "Auto-update cards.json via scheduled sync"
            git push
          else
            echo "No changes to cards.json — nothing to commit."
          fi
